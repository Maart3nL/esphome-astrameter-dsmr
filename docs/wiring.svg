<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="818" height="468" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
  <text x="410" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#1f2328">P1 (RJ12) → Waveshare ESP32-S3-POE-ETH</text>
  <text x="410" y="64" text-anchor="middle" font-size="13" fill="#656d76">DSMR 5 smart-meter wiring — data line is inverted in software, 10 kΩ pull-up to 3V3</text>

  <!-- P1 connector panel -->
  <rect x="55" y="100" width="265" height="330" rx="10" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5"/>
  <text x="187" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">P1 port (RJ12 / 6P6C)</text>

  <!-- ESP board panel -->
  <rect x="540" y="100" width="225" height="330" rx="10" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5"/>
  <text x="652" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">ESP32-S3-POE-ETH</text>

  <!-- 3V3 rail -->
  <circle cx="540" cy="160" r="6" fill="#cf222e"/>
  <text x="556" y="165" font-size="14" fill="#1f2328">3V3</text>

  <!-- Board pins -->
  <circle cx="540" cy="210" r="6" fill="#8250df"/>
  <text x="556" y="215" font-size="14" fill="#1f2328">GPIO17 · request</text>
  <circle cx="540" cy="270" r="6" fill="#0969da"/>
  <text x="556" y="275" font-size="14" fill="#1f2328">GPIO16 · UART RX</text>
  <circle cx="540" cy="350" r="6" fill="#6e7781"/>
  <text x="556" y="355" font-size="14" fill="#1f2328">GND</text>

  <!-- P1 terminals -->
  <circle cx="320" cy="210" r="6" fill="#8250df"/>
  <text x="300" y="206" text-anchor="end" font-size="13" fill="#1f2328">Pin 2 · Data Request</text>
  <circle cx="320" cy="270" r="6" fill="#0969da"/>
  <text x="300" y="266" text-anchor="end" font-size="13" fill="#1f2328">Pin 5 · Data (open-collector)</text>
  <circle cx="320" cy="320" r="6" fill="#6e7781"/>
  <text x="300" y="316" text-anchor="end" font-size="13" fill="#1f2328">Pin 3 · Data GND</text>
  <circle cx="320" cy="370" r="6" fill="#6e7781"/>
  <text x="300" y="366" text-anchor="end" font-size="13" fill="#1f2328">Pin 6 · Power GND</text>
  <text x="187" y="408" text-anchor="middle" font-size="12" fill="#656d76">Pins 1 (+5V) &amp; 4 (NC): leave unconnected</text>

  <!-- Wires -->
  <path d="M320 210 H540" stroke="#8250df" stroke-width="3" fill="none"/>
  <path d="M320 270 H540" stroke="#0969da" stroke-width="3" fill="none"/>
  <path d="M320 320 H470 V350 H540" stroke="#6e7781" stroke-width="3" fill="none"/>
  <path d="M320 370 H470 V350" stroke="#6e7781" stroke-width="3" fill="none"/>

  <!-- Pull-up: from data line up to 3V3 through 10k -->
  <circle cx="430" cy="270" r="4" fill="#0969da"/>
  <path d="M430 270 V210" stroke="#bf8700" stroke-width="3" fill="none"/>
  <rect x="418" y="218" width="24" height="34" rx="3" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <text x="430" y="240" text-anchor="middle" font-size="11" fill="#7d4e00">10k</text>
  <path d="M430 218 V160 H540" stroke="#cf222e" stroke-width="3" fill="none"/>

  <!-- Legend -->
  <text x="410" y="452" text-anchor="middle" font-size="12" fill="#656d76">Direct/DIY wiring shown. Using a P1 cable with a built-in inverter? Set inverted: false and omit the resistor.</text>
</svg>
