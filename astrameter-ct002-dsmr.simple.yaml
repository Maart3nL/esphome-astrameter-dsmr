# =============================================================================
#  AstraMeter CT002 (DSMR) — SIMPLE
#  -----------------------------------------------------------------------------
#  Minimal, self-contained config: a Dutch DSMR 5 (P1) meter feeds the Marstek
#  CT002 emulator. NO Tailscale/VPN, NO web server, NO MQTT — just the P1 reader,
#  the ct002 emulator (which talks UDP to the batteries on the LAN), plus the
#  native API + OTA for monitoring and updates over wired Ethernet.
#
#  Board: Waveshare ESP32-S3-POE-ETH (ESP32-S3R8 + W5500). To install:
#    cp secrets.yaml.example secrets.yaml   # fill in api_encryption_key + ota_password
#    esphome run astrameter-ct002-dsmr.simple.yaml
# =============================================================================

substitutions:
  name: astrameter-ct002-dsmr
  friendly_name: "AstraMeter CT002 (DSMR)"

  # AstraMeter (ct002) release. Releases: https://github.com/tomquist/astrameter/releases
  astrameter_version: "2.2.0"

  # P1 wiring (Waveshare board defaults; change if your wiring differs)
  dsmr_rx_pin: GPIO16           # P1 data line (RJ12 pin 5) → ESP RX (10k pull-up to 3V3)
  dsmr_request_pin: GPIO17      # P1 "Data Request" / RTS (RJ12 pin 2), driven HIGH
  dsmr_baud_rate: "115200"      # DSMR 5.x = 115200 8N1 (older DSMR 2/3 = 9600)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # ct002's UDP responder needs more sockets than ESPHome's auto-size (14).
      CONFIG_LWIP_MAX_SOCKETS: "24"

# 8 MB octal PSRAM (the "R8" module).
psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

# Native API for Home Assistant / the esphome CLI (logs + OTA). reboot_timeout: 0s
# keeps the device running standalone if Home Assistant is absent. Delete this
# block if you don't use HA and only flash over USB.
api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

# Wired Ethernet (W5500 over SPI) — Waveshare ESP32-S3-POE-ETH pin mapping.
# Needed so the ct002 emulator can reach the Marstek batteries (UDP) on the LAN.
ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9
  clock_speed: 25MHz

# AstraMeter CT002 emulator component, pulled from GitHub at the pinned tag above.
external_components:
  - source: github://tomquist/astrameter@${astrameter_version}
    components: [ct002]
    refresh: never        # tag is immutable

# P1 UART. The P1 data line is open-collector AND logically inverted, so we invert
# in software and rely on an external 10k pull-up to 3V3. Using a ready-made P1
# cable with a built-in inverter? Set `inverted: false` here.
uart:
  id: uart_dsmr
  baud_rate: ${dsmr_baud_rate}
  rx_pin:
    number: ${dsmr_rx_pin}
    inverted: true
  rx_buffer_size: 1700

dsmr:
  id: dsmr_instance
  uart_id: uart_dsmr
  request_pin: ${dsmr_request_pin}
  max_telegram_length: 1700

# -----------------------------------------------------------------------------
#  Net grid power per phase in Watt (+ import / − export), fed to ct002. Each
#  power_returned_l? fires once per telegram and recomputes its grid_l? value.
# -----------------------------------------------------------------------------
sensor:
  - platform: dsmr
    power_delivered_l1:
      id: power_delivered_l1
      internal: true
    power_delivered_l2:
      id: power_delivered_l2
      internal: true
    power_delivered_l3:
      id: power_delivered_l3
      internal: true
    power_returned_l1:
      id: power_returned_l1
      internal: true
      on_value:
        then:
          - component.update: grid_l1
    power_returned_l2:
      id: power_returned_l2
      internal: true
      on_value:
        then:
          - component.update: grid_l2
    power_returned_l3:
      id: power_returned_l3
      internal: true
      on_value:
        # ASSUMES A 3-PHASE METER: grid_l3 + the Total recompute hang off L3, so on
        # a 1-phase meter move the grid_power_total update onto power_returned_l1.
        then:
          - component.update: grid_l3
          - component.update: grid_power_total

  - platform: template
    name: "Grid Power L1"
    id: grid_l1
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float in_w = id(power_delivered_l1).state;
      float out_w = id(power_returned_l1).state;
      if (std::isnan(in_w)) in_w = 0.0f;
      if (std::isnan(out_w)) out_w = 0.0f;
      return (in_w - out_w) * 1000.0f;

  - platform: template
    name: "Grid Power L2"
    id: grid_l2
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float in_w = id(power_delivered_l2).state;
      float out_w = id(power_returned_l2).state;
      if (std::isnan(in_w)) in_w = 0.0f;
      if (std::isnan(out_w)) out_w = 0.0f;
      return (in_w - out_w) * 1000.0f;

  - platform: template
    name: "Grid Power L3"
    id: grid_l3
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float in_w = id(power_delivered_l3).state;
      float out_w = id(power_returned_l3).state;
      if (std::isnan(in_w)) in_w = 0.0f;
      if (std::isnan(out_w)) out_w = 0.0f;
      return (in_w - out_w) * 1000.0f;

  - platform: template
    name: "Grid Power Total"
    id: grid_power_total
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float total = 0.0f;
      if (!std::isnan(id(grid_l1).state)) total += id(grid_l1).state;
      if (!std::isnan(id(grid_l2).state)) total += id(grid_l2).state;
      if (!std::isnan(id(grid_l3).state)) total += id(grid_l3).state;
      return total;

# -----------------------------------------------------------------------------
#  Marstek CT002 emulator — three-phase, fed by grid_l1/l2/l3. Uses the
#  component's built-in defaults for filters / balancer / saturation (kept simple).
# -----------------------------------------------------------------------------
ct002:
  id: ct002_main
  power_sensor_l1: grid_l1
  power_sensor_l2: grid_l2
  power_sensor_l3: grid_l3
  ct_type: HME-4              # HME-4 = CT002, HME-3 = CT003
  active_control: true        # balancer steers the batteries toward zero grid
